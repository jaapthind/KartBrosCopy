<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Age: The Original Board Game</title>
    
    <style>
        /* ==========================================================================
           1. CORE LAYOUT & CSS RESET
           ========================================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Arial', sans-serif; }

        body {
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #ui-sidebar {
            flex: 0 0 350px;
            background: #2c3e50;
            border-right: 5px solid #111;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 50;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        #game-board-container {
            flex: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            background: #333;
            position: relative;
        }

        /* ==========================================================================
           2. FAITHFUL BOARD GRID (14x9 HOLLOW RING)
           ========================================================================== */
        #tactical-grid {
            display: grid;
            grid-template-columns: repeat(14, 85px);
            grid-template-rows: repeat(9, 85px);
            gap: 0;
            position: relative;
            background-color: #fff;
            border: 8px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* The 4 Quadrants Background Emulation */
        .quadrant { position: absolute; z-index: 0; }
        .quad-grassy { top: 0; left: 0; width: 50%; height: 50%; background: #a5d6a7; border-bottom: 3px solid #333; border-right: 3px solid #333; }
        .quad-mountains { top: 0; right: 0; width: 50%; height: 50%; background: #b0bec5; border-bottom: 3px solid #333; }
        .quad-village { bottom: 0; left: 0; width: 50%; height: 50%; background: #d7ccc8; border-right: 3px solid #333; }
        .quad-tundra { bottom: 0; right: 0; width: 50%; height: 50%; background: #e0f7fa; }

        /* ==========================================================================
           3. EXACT SPACE STYLING (Teal path, Red text, Black lines)
           ========================================================================== */
        .space {
            background-color: #20b2aa; /* Exact Teal Path */
            border: 3px solid #000;
            color: #d50000; /* Exact Red Text */
            font-weight: 900;
            font-size: 11px;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 4px;
            text-align: center;
            z-index: 10;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.15);
        }

        .space-question {
            font-size: 45px;
            line-height: 1;
            justify-content: center;
        }

        .jaap-stop-sign {
            background-color: #cc0000;
            color: #fff;
            padding: 4px;
            border: 2px solid #fff;
            border-radius: 6px;
            font-size: 11px;
            text-shadow: 1px 1px 0 #000;
        }

        .token-nest {
            display: flex;
            flex-wrap: wrap;
            width: 100%;
            height: 25px;
            gap: 2px;
            justify-content: center;
        }

        .player-token {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 3px 5px rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        /* ==========================================================================
           4. CENTER ISLAND (Title, Discard Pile, Trades Box)
           ========================================================================== */
        #center-island {
            grid-area: 2 / 2 / 9 / 14;
            background: rgba(255,255,255,0.2);
            z-index: 5;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .center-title {
            font-size: 120px;
            font-weight: 900;
            color: #fff;
            text-shadow: 5px 5px 0px #20b2aa, -5px -5px 0px #20b2aa, 5px -5px 0px #20b2aa, -5px 5px 0px #20b2aa;
            letter-spacing: 10px;
            opacity: 0.9;
        }

        .discard-pile-ui {
            position: absolute;
            right: 40px;
            bottom: 40px;
            width: 160px;
            height: 220px;
            background: #7b68ee;
            border: 4px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00008b;
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        .villager-trades-ui {
            position: absolute;
            left: 40px;
            bottom: 40px;
            background: #add8e6;
            border: 4px solid #000;
            padding: 15px;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        /* ==========================================================================
           5. HUD, TERMINAL & MODALS
           ========================================================================== */
        .player-card {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .player-card.active {
            background: #fff;
            color: #000;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255,255,255,0.3);
        }

        .btn-roll {
            background: #ff9800;
            border: 3px solid #e65100;
            color: #000;
            padding: 15px;
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
            border-radius: 8px;
            margin: 15px 0;
            text-transform: uppercase;
        }
        .btn-roll:hover { background: #ffb74d; }
        .btn-roll:disabled { background: #555; border-color: #333; color: #888; cursor: not-allowed; }

        #terminal {
            flex: 1;
            background: #000;
            border: 2px solid #555;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            overflow-y: auto;
            color: #0f0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal {
            background: #fff; color: #000; padding: 30px; border: 5px solid #000;
            max-width: 500px; text-align: center; border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,1);
        }
        .modal h2 { color: #d50000; font-size: 32px; margin-bottom: 15px; text-transform: uppercase; }
        .modal p { font-size: 20px; font-weight: bold; margin-bottom: 25px; }
        .modal-buttons { display: flex; flex-direction: column; gap: 10px; }
        .modal-btn { background: #20b2aa; border: 3px solid #000; padding: 12px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .modal-btn:hover { background: #48d1cc; }

    </style>
</head>
<body>

    <aside id="ui-sidebar">
        <h1 style="text-align: center; color: #20b2aa; margin-bottom: 20px; font-size: 36px; text-shadow: 2px 2px 0 #000;">ICE AGE</h1>
        <div id="players-hud"></div>
        <button id="btn-roll" class="btn-roll" onclick="GameEngine.rollDice()">ROLL DICE 🎲</button>
        <div id="terminal"></div>
    </aside>

    <main id="game-board-container">
        <div id="tactical-grid">
            <div class="quadrant quad-grassy"></div>
            <div class="quadrant quad-mountains"></div>
            <div class="quadrant quad-village"></div>
            <div class="quadrant quad-tundra"></div>
            
            <div id="center-island">
                <div class="center-title">ICE AGE</div>
                
                <div class="villager-trades-ui">
                    <h3 style="border-bottom: 2px solid #000; margin-bottom: 5px;">Villager trades</h3>
                    <p>4 🌰 = 1 Ally</p>
                    <p>1 Ally = 2 🌰</p>
                </div>
                
                <div class="discard-pile-ui">Discard<br>Pile</div>
            </div>
            </div>
    </main>

    <div id="modal-overlay" class="overlay">
        <div class="modal">
            <h2 id="modal-title">EVENT</h2>
            <p id="modal-desc"></p>
            <div id="modal-buttons" class="modal-buttons"></div>
        </div>
    </div>

<script>
/**
 * ============================================================================
 * ICE AGE: THE ORIGINAL BOARD GAME ENGINE
 * 100% faithful to the exact image layout, text, and custom mechanics.
 * ============================================================================
 */

// 1. EXACT SPACE TRANSCRIPTION
const EXACT_BOARD_SPACES = [
    { id: 0, text: "Start", type: "start" },
    { id: 1, text: "Collect one golden acorn", type: "acorn", val: 1 },
    { id: 2, text: "?", type: "question" },
    { id: 3, text: "Choose an ally", type: "ally" },
    { id: 4, text: "Go back to the start", type: "goto", target: 0 },
    { id: 5, text: "1 more roll", type: "roll_again" },
    { id: 6, text: "?", type: "question" },
    { id: 7, text: "?", type: "question" },
    { id: 8, text: "Advance 3 spaces", type: "move", val: 3 },
    { id: 9, text: "Jaap STOP", type: "stop" },
    { id: 10, text: "Advance to the next free space", type: "advance_target", targetType: "free" },
    { id: 11, text: "?", type: "question" },
    { id: 12, text: "Go to the next Jaap stop for 2 golden acorns", type: "advance_target_acorn", targetType: "stop", acornVal: 2 },
    { id: 13, text: "Choose an ally", type: "ally" },
    { id: 14, text: "?", type: "question" },
    { id: 15, text: "Jaap STOP", type: "stop" },
    { id: 16, text: "?", type: "question" },
    { id: 17, text: "collect one golden acorn", type: "acorn", val: 1 },
    { id: 18, text: "?", type: "question" },
    { id: 19, text: "?", type: "question" },
    { id: 20, text: "?", type: "question" },
    { id: 21, text: "Move to the next ally space", type: "advance_target", targetType: "ally" },
    { id: 22, text: "Jaap STOP", type: "stop" },
    { id: 23, text: "?", type: "question" },
    { id: 24, text: "Choose an ally", type: "ally" },
    { id: 25, text: "Free space", type: "free" },
    { id: 26, text: "Go on the bridge if you dare", type: "bridge" },
    { id: 27, text: "Go back 4 spaces", type: "move", val: -4 },
    { id: 28, text: "you lose two golden acorns", type: "lose", val: 2 },
    { id: 29, text: "?", type: "question" },
    { id: 30, text: "Trade with a villager if you want", type: "trade" },
    { id: 31, text: "Free space", type: "free" },
    { id: 32, text: "?", type: "question" },
    { id: 33, text: "Collect one golden acorn from villager", type: "acorn", val: 1 },
    { id: 34, text: "?", type: "question" },
    { id: 35, text: "Go to the end for 4 golden acorns", type: "goto_end", target: 41, acornVal: 4 },
    { id: 36, text: "Trade with a villager if you want", type: "trade" },
    { id: 37, text: "Trade with a villager if you want", type: "trade" },
    { id: 38, text: "Jaap STOP", type: "stop" },
    { id: 39, text: "?", type: "question" },
    { id: 40, text: "Move Back 8 spaces for 2 golden acorns", type: "move_acorn", val: -8, acornVal: 2 },
    { id: 41, text: "End", type: "end" }
];

// Original Deck Logic for "?" Spaces
const EVENT_DECK = [
    "You found a buried acorn! +1 🌰",
    "A Sabertooth chased you! Lose 1 Ally or 2 🌰.",
    "A Mammoth gave you a ride! Advance 2 spaces.",
    "Slipped on the icy glacier! Move back 1 space.",
    "Caught in an avalanche! Lose your next turn.",
    "A villager dropped an acorn! +1 🌰",
    "You befriended a stray dire wolf! +1 Ally.",
    "The ice cracked! Lose 1 🌰."
];

const GameState = {
    players: [
        { id: 0, name: "Scrat", icon: "🐿️", pos: 0, acorns: 0, allies: 0, skip: false, color: "#ff9800" },
        { id: 1, name: "Manny", icon: "🦣", pos: 0, acorns: 0, allies: 0, skip: false, color: "#8d6e63" },
        { id: 2, name: "Diego", icon: "🐯", pos: 0, acorns: 0, allies: 0, skip: false, color: "#f44336" },
        { id: 3, name: "Sid", icon: "🦥", pos: 0, acorns: 0, allies: 0, skip: false, color: "#4caf50" }
    ],
    turnIdx: 0,
    isAnimating: false,
    deck: [...EVENT_DECK],
    discard: []
};

// 2. GRID RENDERER (Builds the 14x9 Hollow Ring)
function buildBoard() {
    const grid = document.getElementById('tactical-grid');
    
    EXACT_BOARD_SPACES.forEach((space, i) => {
        let el = document.createElement('div');
        el.className = 'space';
        
        if (space.type === 'question') {
            el.innerHTML = `<div class="space-question">?</div>`;
            el.style.color = "#d50000";
        } else if (space.type === 'stop') {
            el.innerHTML = `<div class="jaap-stop-sign">${space.text}</div>`;
        } else {
            el.innerHTML = `<span>${space.text}</span>`;
        }

        // Token Container
        let nest = document.createElement('div');
        nest.className = 'token-nest';
        nest.id = `nest-${i}`;
        el.appendChild(nest);

        // Map linear array to hollow 14x9 rectangle
        let col, row;
        if (i <= 13) {
            row = 1; col = i + 1;
        } else if (i <= 20) {
            col = 14; row = (i - 13) + 1;
        } else if (i <= 34) {
            row = 9; col = 14 - (i - 21);
        } else {
            col = 1; row = 9 - (i - 34);
        }

        el.style.gridColumn = col;
        el.style.gridRow = row;
        grid.appendChild(el);
    });

    updateTokens();
    renderHUD();
    log("Game Initialized. Let the survival begin.");
}

// 3. CORE LOGIC ENGINE
const GameEngine = {
    rollDice() {
        if(GameState.isAnimating) return;
        
        let p = GameState.players[GameState.turnIdx];
        if(p.skip) {
            log(`${p.name} is frozen and must skip this turn!`);
            p.skip = false;
            this.endTurn();
            return;
        }

        GameState.isAnimating = true;
        document.getElementById('btn-roll').disabled = true;
        
        let roll = Math.floor(Math.random() * 6) + 1;
        log(`==> <strong>${p.icon} ${p.name}</strong> rolled a <strong>${roll}</strong>!`);
        
        this.stepPlayer(p, roll, false);
    },

    stepPlayer(p, stepsLeft, ignoreStops) {
        if(stepsLeft === 0) {
            GameState.isAnimating = false;
            this.resolveSpace(p, EXACT_BOARD_SPACES[p.pos]);
            return;
        }

        let dir = stepsLeft > 0 ? 1 : -1;
        let nextPos = p.pos + dir;
        
        if(nextPos > 41) nextPos = 41;
        if(nextPos < 0) nextPos = 0;

        p.pos = nextPos;
        updateTokens();
        this.playBeep();

        // Check for "Jaap STOP" interrupting movement
        if(!ignoreStops && dir > 0 && EXACT_BOARD_SPACES[nextPos].type === 'stop') {
            log(`🛑 ${p.name} was halted by a Jaap STOP sign!`);
            GameState.isAnimating = false;
            this.resolveSpace(p, EXACT_BOARD_SPACES[nextPos]);
            return;
        }

        setTimeout(() => {
            this.stepPlayer(p, dir > 0 ? stepsLeft - 1 : stepsLeft + 1, ignoreStops);
        }, 300);
    },

    resolveSpace(p, space) {
        log(`Landed on: [${space.text}]`);
        
        switch(space.type) {
            case 'start':
            case 'free':
                this.endTurn(); break;
            
            case 'acorn':
                p.acorns += space.val; 
                log(`${p.name} gained ${space.val} 🌰.`); 
                this.endTurn(); break;
            
            case 'lose':
                p.acorns = Math.max(0, p.acorns - space.val);
                log(`${p.name} lost ${space.val} 🌰.`);
                this.endTurn(); break;
            
            case 'ally':
                p.allies += 1;
                log(`${p.name} gained 1 Ally 🤝.`);
                this.endTurn(); break;
            
            case 'goto':
                this.stepPlayer(p, space.target - p.pos, true); break;
            
            case 'move':
                this.stepPlayer(p, space.val, false); break;
            
            case 'move_acorn':
                p.acorns += space.acornVal;
                log(`${p.name} collected ${space.acornVal} 🌰!`);
                this.stepPlayer(p, space.val, true); break;
            
            case 'goto_end':
                p.acorns += space.acornVal;
                log(`${p.name} collected ${space.acornVal} 🌰 for reaching the end!`);
                this.stepPlayer(p, space.target - p.pos, true); break;
            
            case 'roll_again':
                log(`${p.name} gets another turn!`);
                GameState.isAnimating = false;
                document.getElementById('btn-roll').disabled = false;
                break;
            
            case 'stop':
                // Just forced to stop, nothing else happens
                this.endTurn(); break;
            
            case 'advance_target':
                let tgt = EXACT_BOARD_SPACES.findIndex((s, i) => i > p.pos && s.type === space.targetType);
                if(tgt > -1) this.stepPlayer(p, tgt - p.pos, true);
                else this.endTurn();
                break;
            
            case 'advance_target_acorn':
                let t = EXACT_BOARD_SPACES.findIndex((s, i) => i > p.pos && s.type === space.targetType);
                if(t > -1) {
                    p.acorns += space.acornVal;
                    log(`Collected ${space.acornVal} 🌰!`);
                    this.stepPlayer(p, t - p.pos, true);
                } else this.endTurn();
                break;
            
            case 'bridge':
                this.handleBridge(p); break;
            
            case 'trade':
                this.handleTrade(p); break;
            
            case 'question':
                this.drawCard(p); break;
            
            case 'end':
                log(`🏁 ${p.name} reached the finish line!`);
                this.endTurn(); break;
        }
        renderHUD();
    },

    handleBridge(p) {
        Modal.show("ICE BRIDGE", "You step onto the rickety ice bridge! Roll the die to see if you survive.<br><br><b>4-6:</b> Safe! (+2 🌰)<br><b>1-3:</b> The ice breaks! (Go back 3 spaces)", [
            { text: "ROLL FOR SURVIVAL", action: () => {
                let r = Math.floor(Math.random() * 6) + 1;
                if(r >= 4) {
                    p.acorns += 2;
                    Modal.show("SAFE!", `You rolled a ${r}. You made it across! (+2 🌰)`, [{ text: "PHEW", action: () => this.endTurn() }]);
                } else {
                    Modal.show("CRACK!", `You rolled a ${r}. The bridge collapsed!`, [{ text: "FALL BACK", action: () => this.stepPlayer(p, -3, true) }]);
                }
            }}
        ]);
    },

    handleTrade(p) {
        Modal.show("VILLAGER TRADES", `Welcome to the village. What would you like to trade?`, [
            { text: "4 🌰 -> 1 Ally", action: () => {
                if(p.acorns >= 4) { p.acorns -= 4; p.allies += 1; log(`${p.name} traded 4 🌰 for 1 Ally.`); renderHUD(); }
                else alert("Not enough Acorns!");
            }},
            { text: "1 Ally -> 2 🌰", action: () => {
                if(p.allies >= 1) { p.allies -= 1; p.acorns += 2; log(`${p.name} traded 1 Ally for 2 🌰.`); renderHUD(); }
                else alert("Not enough Allies!");
            }},
            { text: "DONE TRADING", action: () => this.endTurn() }
        ]);
    },

    drawCard(p) {
        if(GameState.deck.length === 0) {
            GameState.deck = [...GameState.discard].sort(() => Math.random() - 0.5);
            GameState.discard = [];
            log("Discard pile reshuffled into deck.");
        }
        
        let card = GameState.deck.pop();
        GameState.discard.push(card);
        
        Modal.show("DISCARD PILE EVENT", card, [{ text: "ACCEPT FATE", action: () => {
            if(card.includes("+1 🌰")) p.acorns += 1;
            if(card.includes("-1 🌰")) p.acorns = Math.max(0, p.acorns - 1);
            if(card.includes("+3 🌰")) p.acorns += 3;
            if(card.includes("+1 Ally")) p.allies += 1;
            if(card.includes("Lose 1 Ally or 2 🌰")) {
                if(p.allies > 0) p.allies--; else p.acorns = Math.max(0, p.acorns - 2);
            }
            if(card.includes("back 1 space")) return this.stepPlayer(p, -1, true);
            if(card.includes("back 2 spaces")) return this.stepPlayer(p, -2, true);
            if(card.includes("Advance 2 spaces")) return this.stepPlayer(p, 2, true);
            if(card.includes("Advance 3 spaces")) return this.stepPlayer(p, 3, true);
            if(card.includes("Lose your next turn")) p.skip = true;
            
            this.endTurn();
        }}]);
    },

    endTurn() {
        GameState.isAnimating = false;
        
        // Check End Game (If everyone is at space 41)
        if(GameState.players.every(pl => pl.pos === 41)) {
            let winner = [...GameState.players].sort((a,b) => b.acorns - a.acorns)[0];
            Modal.show("GAME OVER", `All players have reached the End!<br><br>The winner is <strong>${winner.name}</strong> with ${winner.acorns} Golden Acorns!`, [
                { text: "PLAY AGAIN", action: () => location.reload() }
            ]);
            return;
        }

        do {
            GameState.turnIdx = (GameState.turnIdx + 1) % GameState.players.length;
        } while (GameState.players[GameState.turnIdx].pos === 41); // Skip finished players

        document.getElementById('btn-roll').disabled = false;
        renderHUD();
    },

    playBeep() {
        try {
            let ctx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = ctx.createOscillator();
            let gain = ctx.createGain();
            osc.type = 'sine'; osc.frequency.value = 600;
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
    }
};

// 4. UI CONTROLLERS
const Modal = {
    show(title, text, buttons) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerHTML = text;
        let box = document.getElementById('modal-buttons');
        box.innerHTML = '';
        
        buttons.forEach(b => {
            let btn = document.createElement('button');
            btn.className = 'modal-btn';
            btn.innerText = b.text;
            btn.onclick = () => {
                document.getElementById('modal-overlay').style.display = 'none';
                b.action();
            };
            box.appendChild(btn);
        });
        
        document.getElementById('modal-overlay').style.display = 'flex';
    }
};

function updateTokens() {
    document.querySelectorAll('.token-nest').forEach(n => n.innerHTML = '');
    GameState.players.forEach(p => {
        let t = document.createElement('div');
        t.className = 'player-token';
        t.style.backgroundColor = p.color;
        t.innerText = p.icon;
        document.getElementById(`nest-${p.pos}`).appendChild(t);
    });
}

function renderHUD() {
    let box = document.getElementById('players-hud');
    box.innerHTML = '';
    GameState.players.forEach((p, i) => {
        let active = i === GameState.turnIdx ? 'active' : '';
        box.innerHTML += `
            <div class="player-card ${active}" style="border-left: 8px solid ${p.color}">
                <h3 style="margin-bottom: 5px; font-size: 22px;">${p.icon} ${p.name}</h3>
                <div style="font-weight: bold; color: ${active ? '#333' : '#ccc'};">
                    🌰 Acorns: <span style="color: #d50000;">${p.acorns}</span><br>
                    🤝 Allies: <span style="color: #20b2aa;">${p.allies}</span>
                </div>
            </div>
        `;
    });
}

function log(msg) {
    let t = document.getElementById('terminal');
    t.innerHTML = `<div>> ${msg}</div>` + t.innerHTML;
}

// Boot
window.onload = buildBoard;

</script>
</body>
</html>
